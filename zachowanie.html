<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chcieć to móc - Arkusz Postępów</title>
    <style>
        :root {
            --pastel-blue: #e3f2fd;
            --pastel-green: #e8f5e9;
            --accent: #ff9800;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: background-color 0.5s;
            -webkit-tap-highlight-color: transparent;
        }

        .auth-bar {
            background: #2c3e50;
            color: white;
            padding: 10px 15px;
            border-radius: 50px;
            margin-bottom: 15px;
            display: flex;
            gap: 10px;
            align-items: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            font-size: 0.9em;
            width: 90%;
            max-width: 400px;
            justify-content: center;
        }

        .auth-bar input {
            padding: 5px 10px;
            border-radius: 20px;
            border: none;
            width: 80px;
        }

        .container {
            max-width: 900px;
            width: 100%;
            background: white;
            padding: 15px;
            border-radius: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            border: 4px solid #fff;
            position: relative;
            box-sizing: border-box;
        }

        .locked-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 10;
            cursor: not-allowed;
            display: block;
        }

        h1 { color: #2c3e50; text-align: center; font-size: 1.6em; margin: 10px 0 5px 0; }
        .subtitle { text-align: center; margin-bottom: 15px; color: #555; font-weight: bold; text-transform: uppercase; font-size: 0.75em; }

        .nav-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; gap: 5px; }
        .nav-bar h2 { font-size: 1em; margin: 0; white-space: nowrap; }

        .grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; margin-bottom: 20px; }
        .day-label { text-align: center; font-weight: bold; color: #718096; font-size: 0.65em; text-transform: uppercase; }
        
        .day-cell { 
            aspect-ratio: 1; 
            border: 2px dashed #cbd5e0; 
            border-radius: 10px; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            cursor: pointer; 
            position: relative; 
            background: #fff; 
        }
        .day-num { position: absolute; top: 4px; left: 4px; font-size: 0.7em; color: #a0aec0; font-weight: bold; }
        .sticker { font-size: 1.5em; }

        .status-footer { display: flex; flex-direction: column; gap: 15px; margin-top: 15px; }
        
        .badges-box { background: #fffef0; padding: 12px; border-radius: 20px; border: 3px solid #ffe082; display: flex; flex-direction: column; align-items: center; gap: 12px; }
        .badge-row { display: flex; gap: 8px; justify-content: center; width: 100%; flex-wrap: wrap; }
        
        .reward-box { background: #fdf2e9; padding: 15px; border-radius: 20px; border: 3px solid #ed8936; text-align: center; }
        #rewardInput { width: 100%; padding: 10px; border: 2px solid #e2e8f0; border-radius: 10px; text-align: center; margin-bottom: 10px; box-sizing: border-box; font-size: 16px; /* Prevent zoom on iOS */ }

        .trophy-container {
            font-size: 2em;
            display: inline-block;
            padding: 8px;
            border-radius: 50%;
            border: 4px solid #cbd5e0;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            line-height: 1;
        }
        .trophy-green { border-color: #4ade80; box-shadow: 0 0 10px rgba(74, 222, 128, 0.3); }
        .trophy-yellow { border-color: #facc15; box-shadow: 0 0 10px rgba(250, 204, 21, 0.3); }
        .trophy-red { border-color: #f87171; box-shadow: 0 0 10px rgba(248, 113, 113, 0.3); }
        .trophy-enlarged { transform: scale(1.2); }

        .badge { text-align: center; filter: grayscale(1); opacity: 0.1; transition: 0.5s; width: 45px; }
        .badge.active { filter: grayscale(0); opacity: 1; }
        .badge-icon { font-size: 1.5em; display: block; }
        .badge-label { font-size: 0.6em; font-weight: bold; display: block; white-space: nowrap; overflow: hidden; }

        .controls { margin-top: 20px; display: flex; flex-direction: column; gap: 10px; width: 100%; }
        button { padding: 12px; border: none; border-radius: 50px; background: var(--accent); color: white; font-weight: bold; cursor: pointer; font-size: 0.9em; width: 100%; }
        
        /* Desktop improvements */
        @media (min-width: 600px) {
            h1 { font-size: 2.2em; }
            .subtitle { font-size: 0.9em; }
            .sticker { font-size: 2.5em; }
            .status-footer { display: grid; grid-template-columns: 1.2fr 1fr; }
            .controls { flex-direction: row; }
            .badge { width: 60px; }
            .badge-icon { font-size: 2.2em; }
            .badge-label { font-size: 0.7em; }
            .nav-bar h2 { font-size: 1.5em; }
            button { width: auto; }
        }

        @media print { .auth-bar, .nav-bar, .controls, .locked-overlay { display: none !important; } }
        .bg-blue { background-color: var(--pastel-blue); }
        .bg-green { background-color: var(--pastel-green); }
    </style>
</head>
<body id="bodyTag">

    <div class="auth-bar">
        <span>🔑 Hasło:</span>
        <input type="password" id="passInput" oninput="checkPass()">
        <span id="lockStatus">🔒</span>
    </div>

    <div class="container">
        <div id="lockLayer" class="locked-overlay"></div>
        <h1>🏕️ Chcieć to móc!</h1>
        <div class="subtitle">Arkusz moich postępów</div>

        <div class="nav-bar">
            <button onclick="changeMonth(-1)">⬅️</button>
            <h2 id="currentMonthYear">Kwiecień 2026</h2>
            <button onclick="changeMonth(1)">➡️</button>
        </div>

        <div class="grid" id="calendarGrid"></div>

        <div class="status-footer">
            <div class="badges-box">
                <div class="badge-row" id="weeklyBadges"></div>
                <div class="monthly-award-zone" id="monthlyAwardZone"></div>
            </div>

            <div class="reward-box">
                <h3 style="font-size: 0.9em; margin: 0 0 10px 0;">🎁 GRAM O:</h3>
                <input type="text" id="rewardInput" placeholder="Cel..." oninput="saveReward()">
                <div>
                    <div id="rewardTrophy" class="trophy-container">🏆</div>
                    <div id="congratsLabel"></div>
                </div>
            </div>
        </div>

        <div class="controls">
            <button onclick="window.print()" style="background: #4a5568;">🖨️ PDF</button>
            <button onclick="resetMonth()" style="background: #cbd5e0; color: #4a5568;">Reset</button>
        </div>
    </div>

    <script>
        let currentDate = new Date(2026, 3, 1);
        const symbols = ["", "☀️🚐", "🤔", "🌧️⛺"];
        const dayNames = ["P", "W", "Ś", "C", "P", "S", "N"];
        const storageKey = "progressData_v5";
        let history = JSON.parse(localStorage.getItem(storageKey)) || {};
        let isUnlocked = false;

        function checkPass() {
            const pass = document.getElementById('passInput').value;
            const lockLayer = document.getElementById('lockLayer');
            const status = document.getElementById('lockStatus');
            if(pass.toLowerCase() === "rajdowiec") {
                isUnlocked = true; lockLayer.style.display = "none";
                status.innerText = "🔓"; status.style.color = "#4ade80";
            } else {
                isUnlocked = false; lockLayer.style.display = "block";
                status.innerText = "🔒"; status.style.color = "white";
            }
        }

        function updateCalendar() {
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();
            const monthName = new Intl.DateTimeFormat('pl-PL', { month: 'long', year: 'numeric' }).format(currentDate);
            document.getElementById('currentMonthYear').innerText = monthName.charAt(0).toUpperCase() + monthName.slice(1);
            document.getElementById('bodyTag').className = (month === 6 || month === 7) ? 'bg-green' : 'bg-blue';

            const grid = document.getElementById('calendarGrid');
            grid.innerHTML = '';
            dayNames.forEach(day => {
                const label = document.createElement('div');
                label.className = 'day-label'; label.innerText = day; grid.appendChild(label);
            });

            let firstDay = new Date(year, month, 1).getDay();
            let offset = firstDay === 0 ? 6 : firstDay - 1; 
            for (let i = 0; i < offset; i++) grid.appendChild(document.createElement('div')).className = 'day-cell-empty';

            const daysInMonth = new Date(year, month + 1, 0).getDate();
            let monthKey = `${year}-${month}`;
            if (!history[monthKey]) history[monthKey] = { stickers: {}, reward: "" };
            document.getElementById('rewardInput').value = history[monthKey].reward || "";

            for (let i = 1; i <= daysInMonth; i++) {
                const cell = document.createElement('div');
                cell.className = 'day-cell';
                cell.innerHTML = `<span class="day-num">${i}</span>`;
                const stickerDiv = document.createElement('div');
                stickerDiv.className = 'sticker';
                stickerDiv.innerText = history[monthKey].stickers[i] || "";
                cell.appendChild(stickerDiv);
                cell.onclick = () => {
                    if(!isUnlocked) return;
                    let currentIdx = symbols.indexOf(stickerDiv.innerText);
                    stickerDiv.innerText = symbols[(currentIdx + 1) % symbols.length];
                    history[monthKey].stickers[i] = stickerDiv.innerText;
                    saveData(); checkBadges();
                };
                grid.appendChild(cell);
            }
            checkBadges();
        }

        function checkBadges() {
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();
            const monthKey = `${year}-${month}`;
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const weeklyContainer = document.getElementById('weeklyBadges');
            weeklyContainer.innerHTML = '';

            for (let d = 1; d <= daysInMonth; d++) {
                let checkDate = new Date(year, month, d);
                if (checkDate.getDay() === 0) {
                    let posW = 0, neuW = 0, negW = 0;
                    let sundayHasSticker = false;
                    for (let i = 0; i < 7; i++) {
                        let targetDate = new Date(year, month, d - i);
                        let ty = targetDate.getFullYear(), tm = targetDate.getMonth(), td = targetDate.getDate();
                        if (ty === 2026 && tm === 3 && td < 13) continue;
                        let tKey = `${ty}-${tm}`;
                        let s = (history[tKey] && history[tKey].stickers) ? history[tKey].stickers[td] : "";
                        if (i === 0 && s && s !== "") sundayHasSticker = true;
                        if (s === "☀️🚐") posW++; else if (s === "🤔") neuW++; else if (s === "🌧️⛺") negW++;
                    }
                    const badge = document.createElement('div');
                    let light = "⚪", active = false;
                    if (sundayHasSticker) {
                        if (posW > neuW && posW > negW) light = "🟢"; else if (negW > posW && negW > neuW) light = "🔴"; else light = "🟡";
                        active = true;
                    }
                    badge.className = `badge ${active ? 'active' : ''}`;
                    badge.innerHTML = `<span class="badge-icon">${light}</span><span class="badge-label">${d}.${month+1}</span>`;
                    weeklyContainer.appendChild(badge);
                }
            }

            let totalPos = 0, totalNeu = 0, totalNeg = 0;
            const stickers = history[monthKey].stickers || {};
            for (let d = 1; d <= daysInMonth; d++) {
                if (year === 2026 && month === 3 && d < 13) continue;
                let s = stickers[d];
                if (s === "☀️🚐") totalPos++; else if (s === "🤔") totalNeu++; else if (s === "🌧️⛺") totalNeg++;
            }

            const awardZone = document.getElementById('monthlyAwardZone');
            const trophy = document.getElementById('rewardTrophy');
            const congrats = document.getElementById('congratsLabel');
            const today = new Date();
            const isLastDayOfMonth = (today.getDate() === daysInMonth && today.getMonth() === month && today.getFullYear() === year) || (new Date(year, month, daysInMonth) < today);

            trophy.className = "trophy-container";
            congrats.innerHTML = "";
            if (totalPos > totalNeu && totalPos > totalNeg) trophy.classList.add('trophy-green');
            else if (totalNeg > totalPos && totalNeg > totalNeu) trophy.classList.add('trophy-red');
            else if (totalPos > 0 || totalNeu > 0 || totalNeg > 0) trophy.classList.add('trophy-yellow');

            if (isLastDayOfMonth && totalPos > totalNeu && totalPos > totalNeg) {
                trophy.classList.add('trophy-enlarged');
                congrats.innerHTML = '<span class="congrats-text" style="color:#4ade80">Gratulacje!</span>';
            }

            if (!isLastDayOfMonth) {
                let icon = "🚦⚪🏆", msg = "Zatrzymaj się i pomyśl.";
                if (totalPos > totalNeu && totalPos > totalNeg) { icon = "🚦🟢🏆"; msg = "Dobra droga!"; }
                else if (totalNeg > totalPos && totalNeg > totalNeu) { icon = "🚦🔴🏆"; msg = "Pomyśl - zmień to."; }
                else if (totalPos > 0 || totalNeu > 0 || totalNeg > 0) { icon = "🚦🟡🏆"; msg = "Jutro będzie lepiej."; }
                awardZone.innerHTML = `<div style="font-size:2em">${icon}</div><div class="traffic-light-msg" style="font-size:0.75em">${msg}</div>`;
            } else {
                let icon = "🔧", msg = "Usterka!", label = "NAPRAWA";
                if (totalPos > totalNeu && totalPos > totalNeg) { icon = "🏆"; msg = "Świetnie!"; label = "MISTRZ"; }
                else if (totalNeg > totalPos && totalNeg > totalNeu) { icon = "🔧"; msg = "Usterka!"; label = "NAPRAWA"; }
                else { icon = "💪"; msg = "Działamy!"; label = "TRENING"; }
                awardZone.innerHTML = `<div class="badge active"><span class="badge-icon">${icon}</span><span class="badge-label">${label}</span></div><div class="final-msg" style="font-size:0.8em">${msg}</div>`;
            }
        }

        function saveReward() { if(isUnlocked) { history[`${currentDate.getFullYear()}-${currentDate.getMonth()}`].reward = document.getElementById('rewardInput').value; saveData(); } }
        function saveData() { localStorage.setItem(storageKey, JSON.stringify(history)); }
        function changeMonth(dir) { currentDate.setMonth(currentDate.getMonth() + dir); updateCalendar(); }
        function resetMonth() { if(isUnlocked && confirm("Wyczyścić?")) { history[`${currentDate.getFullYear()}-${currentDate.getMonth()}`] = { stickers: {}, reward: "" }; saveData(); updateCalendar(); } }

        updateCalendar();
    </script>
</body>
</html>
