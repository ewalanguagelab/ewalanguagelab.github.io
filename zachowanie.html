<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chcieć to móc - Arkusz Postępów</title>
    <style>
        :root {
            --pastel-blue: #e3f2fd;
            --pastel-green: #e8f5e9;
            --accent: #ff9800;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: background-color 0.5s;
            -webkit-tap-highlight-color: transparent;
        }

        .auth-bar {
            background: #2c3e50;
            color: white;
            padding: 10px 15px;
            border-radius: 50px;
            margin-bottom: 15px;
            display: flex;
            gap: 10px;
            align-items: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            font-size: 0.9em;
            width: 90%;
            max-width: 400px;
            justify-content: center;
            position: relative;
            z-index: 100;
        }

        .auth-bar input {
            padding: 5px 10px;
            border-radius: 20px;
            border: none;
            width: 80px;
            outline: none;
        }

        .container {
            max-width: 900px;
            width: 100%;
            background: white;
            padding: 15px;
            border-radius: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            border: 4px solid #fff;
            position: relative;
            box-sizing: border-box;
        }

        .locked-overlay {
            position: absolute;
            top: 140px; 
            left: 0; width: 100%; height: calc(100% - 140px);
            z-index: 10;
            cursor: not-allowed;
            display: block;
            background: rgba(255,255,255,0);
        }

        h1 { color: #2c3e50; text-align: center; font-size: 1.6em; margin: 10px 0 5px 0; }
        .subtitle { text-align: center; margin-bottom: 15px; color: #555; font-weight: bold; text-transform: uppercase; font-size: 0.75em; }

        .nav-bar { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 15px; 
            position: relative; 
            z-index: 20; 
        }
        .nav-bar h2 { font-size: 1.1em; margin: 0; }

        .grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; margin-bottom: 20px; }
        .day-label { text-align: center; font-weight: bold; color: #718096; font-size: 0.65em; }
        
        .day-cell { 
            aspect-ratio: 1; 
            border: 2px dashed #cbd5e0; 
            border-radius: 10px; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            cursor: pointer; 
            position: relative; 
            background: #fff; 
        }
        .day-num { position: absolute; top: 3px; left: 4px; font-size: 0.7em; color: #a0aec0; }
        .sticker { font-size: 1.5em; }

        .status-footer { display: flex; flex-direction: column; gap: 15px; margin-top: 15px; }
        .badges-box { background: #fffef0; padding: 12px; border-radius: 20px; border: 3px solid #ffe082; text-align: center; }
        .badge-row { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; margin-bottom: 10px; }

        .reward-box { background: #fdf2e9; padding: 15px; border-radius: 20px; border: 3px solid #ed8936; text-align: center; }
        #rewardInput { width: 100%; padding: 10px; border: 2px solid #e2e8f0; border-radius: 10px; text-align: center; font-size: 16px; margin-bottom: 10px; box-sizing: border-box; }

        /* Puchar interaktywny */
        .trophy-container {
            font-size: 2.5em;
            display: inline-block;
            padding: 10px;
            border-radius: 50%;
            border: 5px solid #cbd5e0;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            line-height: 1;
            margin: 5px 0;
            background: white;
        }
        .trophy-green { border-color: #4ade80; box-shadow: 0 0 15px rgba(74, 222, 128, 0.5); }
        .trophy-yellow { border-color: #facc15; box-shadow: 0 0 15px rgba(250, 204, 21, 0.5); }
        .trophy-red { border-color: #f87171; box-shadow: 0 0 15px rgba(248, 113, 113, 0.5); }
        .trophy-enlarged { transform: scale(1.4); }
        
        #congratsLabel { font-weight: bold; color: #2c3e50; height: 20px; margin-top: 5px; }

        .badge { text-align: center; filter: grayscale(1); opacity: 0.1; width: 45px; }
        .badge.active { filter: grayscale(0); opacity: 1; }
        .badge-icon { font-size: 1.5em; display: block; }
        .badge-label { font-size: 0.6em; font-weight: bold; }

        .controls { margin-top: 20px; display: flex; flex-direction: column; gap: 10px; width: 100%; position: relative; z-index: 20; }
        button { padding: 12px; border: none; border-radius: 50px; background: var(--accent); color: white; font-weight: bold; cursor: pointer; }
        
        @media (min-width: 600px) {
            .status-footer { display: grid; grid-template-columns: 1.2fr 1fr; }
            .controls { flex-direction: row; }
            .sticker { font-size: 2.5em; }
            .badge { width: 60px; }
            .badge-icon { font-size: 2.2em; }
        }

        .bg-blue { background-color: var(--pastel-blue); }
        .bg-green { background-color: var(--pastel-green); }
        #syncStatus { font-size: 0.7em; color: #718096; text-align: center; margin-bottom: 5px; }
    </style>
</head>
<body id="bodyTag">

    <div class="auth-bar">
        <span>🔑 Hasło:</span>
        <input type="password" id="passInput" oninput="checkPass()">
        <span id="lockStatus">🔒</span>
    </div>

    <div class="container">
        <div id="lockLayer" class="locked-overlay"></div>
        <div id="syncStatus">Synchronizacja...</div>
        <h1>🏕️ Chcieć to móc!</h1>
        <div class="subtitle">Arkusz moich postępów</div>

        <div class="nav-bar">
            <button onclick="changeMonth(-1)">⬅️</button>
            <h2 id="currentMonthYear">Ładowanie...</h2>
            <button onclick="changeMonth(1)">➡️</button>
        </div>

        <div id="calendarGrid" class="grid"></div>

        <div class="status-footer">
            <div class="badges-box">
                <div id="weeklyBadges" class="badge-row"></div>
                <div id="monthlyAwardZone"></div>
            </div>

            <div class="reward-box">
                <h3 style="margin:0 0 10px 0; font-size: 0.9em;">🎁 W TYM MIESIĄCU GRAM O:</h3>
                <input type="text" id="rewardInput" placeholder="Wpisz cel..." oninput="saveReward()">
                <div>
                    <div id="rewardTrophy" class="trophy-container">🏆</div>
                    <div id="congratsLabel"></div>
                </div>
            </div>
        </div>

        <div class="controls">
            <button onclick="window.print()" style="background: #4a5568;">🖨️ Drukuj</button>
            <button onclick="resetMonth()" style="background: #cbd5e0; color: #4a5568;">Reset</button>
        </div>
    </div>

    <script>
        // Baza danych JSON (npoint.io)
        const BIN_ID = "fd0f47138ac12f6ff418"; 
        const API_URL = `https://api.npoint.io/${BIN_ID}`;

        let currentDate = new Date(2026, 3, 1);
        const symbols = ["", "☀️🚐", "🤔", "🌧️⛺"];
        const dayNames = ["P", "W", "Ś", "C", "P", "S", "N"];
        let history = {};
        let isUnlocked = false;

        async function loadData() {
            try {
                const response = await fetch(API_URL);
                if (!response.ok) throw new Error();
                history = await response.json();
                document.getElementById('syncStatus').innerText = "Dane zaktualizowane";
                updateCalendar();
            } catch (e) {
                document.getElementById('syncStatus').innerText = "Błąd synchronizacji";
            }
        }

        async function saveData() {
            if (!isUnlocked) return;
            document.getElementById('syncStatus').innerText = "Zapisywanie...";
            try {
                await fetch(API_URL, {
                    method: 'POST', // npoint używa POST do aktualizacji całej treści
                    body: JSON.stringify(history),
                    headers: { 'Content-Type': 'application/json' }
                });
                document.getElementById('syncStatus').innerText = "Zapisano pomyślnie";
            } catch (e) {
                document.getElementById('syncStatus').innerText = "Błąd zapisu!";
            }
        }

        // Automatyczne odświeżanie danych co 15 sekund dla użytkowników "tylko do odczytu"
        setInterval(() => { if(!isUnlocked) loadData(); }, 15000);

        function checkPass() {
            const pass = document.getElementById('passInput').value;
            const lockLayer = document.getElementById('lockLayer');
            const status = document.getElementById('lockStatus');
            if(pass.toLowerCase() === "rajdowiec") {
                isUnlocked = true; lockLayer.style.display = "none";
                status.innerText = "🔓"; status.style.color = "#4ade80";
            } else {
                isUnlocked = false; lockLayer.style.display = "block";
                status.innerText = "🔒"; status.style.color = "white";
            }
        }

        function updateCalendar() {
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();
            const monthName = new Intl.DateTimeFormat('pl-PL', { month: 'long', year: 'numeric' }).format(currentDate);
            document.getElementById('currentMonthYear').innerText = monthName.charAt(0).toUpperCase() + monthName.slice(1);
            document.getElementById('bodyTag').className = (month === 6 || month === 7) ? 'bg-green' : 'bg-blue';

            const grid = document.getElementById('calendarGrid');
            grid.innerHTML = '';
            dayNames.forEach(day => grid.innerHTML += `<div class="day-label">${day}</div>`);

            let firstDay = new Date(year, month, 1).getDay();
            let offset = firstDay === 0 ? 6 : firstDay - 1; 
            for (let i = 0; i < offset; i++) grid.innerHTML += `<div></div>`;

            const daysInMonth = new Date(year, month + 1, 0).getDate();
            let monthKey = `${year}-${month}`;
            if (!history[monthKey]) history[monthKey] = { stickers: {}, reward: "" };
            document.getElementById('rewardInput').value = history[monthKey].reward || "";

            for (let i = 1; i <= daysInMonth; i++) {
                const cell = document.createElement('div');
                cell.className = 'day-cell';
                cell.innerHTML = `<span class="day-num">${i}</span>`;
                const stickerDiv = document.createElement('div');
                stickerDiv.className = 'sticker';
                stickerDiv.innerText = history[monthKey].stickers[i] || "";
                cell.appendChild(stickerDiv);
                
                cell.onclick = () => {
                    if(!isUnlocked) return;
                    let currentIdx = symbols.indexOf(stickerDiv.innerText);
                    stickerDiv.innerText = symbols[(currentIdx + 1) % symbols.length];
                    history[monthKey].stickers[i] = stickerDiv.innerText;
                    checkBadges();
                    saveData();
                };
                grid.appendChild(cell);
            }
            checkBadges();
        }

        function checkBadges() {
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();
            const monthKey = `${year}-${month}`;
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            
            // Podliczanie statystyk miesiąca
            let totalPos = 0, totalNeu = 0, totalNeg = 0;
            const stickers = history[monthKey]?.stickers || {};
            for (let d = 1; d <= daysInMonth; d++) {
                let s = stickers[d];
                if (s === "☀️🚐") totalPos++; else if (s === "🤔") totalNeu++; else if (s === "🌧️⛺") totalNeg++;
            }

            // Puchar w polu nagrody
            const trophy = document.getElementById('rewardTrophy');
            const congrats = document.getElementById('congratsLabel');
            trophy.className = "trophy-container";
            congrats.innerText = "";

            if (totalPos > totalNeu && totalPos > totalNeg) trophy.classList.add('trophy-green');
            else if (totalNeg > totalPos && totalNeg > totalNeu) trophy.classList.add('trophy-red');
            else if (totalPos > 0 || totalNeu > 0 || totalNeg > 0) trophy.classList.add('trophy-yellow');

            const today = new Date();
            const isEndOfMonth = (today.getMonth() > month && today.getFullYear() >= year) || (today.getDate() === daysInMonth && today.getMonth() === month);
            
            if (isEndOfMonth && totalPos > totalNeu && totalPos > totalNeg) {
                trophy.classList.add('trophy-enlarged');
                congrats.innerText = "Gratulacje!";
            }

            // Nagłówki tygodniowe (uproszczone dla czytelności)
            const weeklyContainer = document.getElementById('weeklyBadges');
            weeklyContainer.innerHTML = '';
            for (let d = 1; d <= daysInMonth; d++) {
                let checkDate = new Date(year, month, d);
                if (checkDate.getDay() === 0) { // Niedziele
                    const badge = document.createElement('div');
                    badge.className = 'badge active';
                    badge.innerHTML = `<span class="badge-icon">🏆</span><span class="badge-label">${d}.${month+1}</span>`;
                    weeklyContainer.appendChild(badge);
                }
            }

            const awardZone = document.getElementById('monthlyAwardZone');
            awardZone.innerHTML = isEndOfMonth ? "<strong>Podsumowanie miesiąca gotowe!</strong>" : "<em>Zbieraj symbole, aby zdobyć puchar!</em>";
        }

        function saveReward() { if(isUnlocked) { history[`${currentDate.getFullYear()}-${currentDate.getMonth()}`].reward = document.getElementById('rewardInput').value; saveData(); } }
        function changeMonth(dir) { currentDate.setMonth(currentDate.getMonth() + dir); updateCalendar(); }
        function resetMonth() { if(isUnlocked && confirm("Wyczyścić ten miesiąc?")) { history[`${currentDate.getFullYear()}-${currentDate.getMonth()}`] = { stickers: {}, reward: "" }; saveData(); updateCalendar(); } }

        loadData();
    </script>
</body>
</html>
