<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chcieć to móc - Arkusz Postępów</title>
    <style>
        :root { --pastel-blue: #e3f2fd; --pastel-green: #e8f5e9; --accent: #ff9800; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; transition: background-color 0.5s; -webkit-tap-highlight-color: transparent; }
        .auth-bar { background: #2c3e50; color: white; padding: 10px 15px; border-radius: 50px; margin-bottom: 15px; display: flex; gap: 10px; align-items: center; box-shadow: 0 4px 10px rgba(0,0,0,0.2); font-size: 0.9em; width: 90%; max-width: 400px; justify-content: center; position: relative; z-index: 1000; }
        .auth-bar input { padding: 5px 10px; border-radius: 20px; border: none; width: 80px; font-size: 16px; }
        .container { max-width: 900px; width: 100%; background: white; padding: 15px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border: 4px solid #fff; position: relative; box-sizing: border-box; }
        #lockLayer { position: absolute; top: 150px; left: 0; width: 100%; height: calc(100% - 150px); z-index: 100; display: block; background: rgba(255,255,255,0); }
        h1 { color: #2c3e50; text-align: center; font-size: 1.6em; margin: 10px 0 5px 0; }
        .subtitle { text-align: center; margin-bottom: 15px; color: #555; font-weight: bold; text-transform: uppercase; font-size: 0.75em; }
        .nav-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; position: relative; z-index: 200; }
        .grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; margin-bottom: 20px; }
        .day-label { text-align: center; font-weight: bold; color: #718096; font-size: 0.65em; }
        .day-cell { aspect-ratio: 1; border: 2px dashed #cbd5e0; border-radius: 10px; display: flex; justify-content: center; align-items: center; position: relative; background: #fff; cursor: pointer; }
        .day-num { position: absolute; top: 3px; left: 4px; font-size: 0.7em; color: #a0aec0; }
        .sticker { font-size: 1.5em; }
        .status-footer { display: flex; flex-direction: column; gap: 15px; margin-top: 15px; }
        .badges-box { background: #fffef0; padding: 12px; border-radius: 20px; border: 3px solid #ffe082; text-align: center; }
        .reward-box { background: #fdf2e9; padding: 15px; border-radius: 20px; border: 3px solid #ed8936; text-align: center; }
        #rewardInput { width: 100%; padding: 10px; border: 2px solid #e2e8f0; border-radius: 10px; text-align: center; font-size: 16px; margin-bottom: 10px; box-sizing: border-box; }
        .trophy-container { font-size: 2.2em; display: inline-block; padding: 8px; border-radius: 50%; border: 4px solid #cbd5e0; background: #fff; line-height: 1; }
        .controls { margin-top: 20px; display: flex; flex-direction: column; gap: 10px; width: 100%; position: relative; z-index: 200; }
        button { padding: 12px; border: none; border-radius: 50px; background: var(--accent); color: white; font-weight: bold; cursor: pointer; }
        .bg-blue { background-color: var(--pastel-blue); }
        .bg-green { background-color: var(--pastel-green); }
        #syncInfo { font-size: 0.75em; color: #2c3e50; text-align: center; margin-bottom: 5px; font-weight: bold; background: #ebf8ff; padding: 5px; border-radius: 10px; }
    </style>
</head>
<body id="bodyTag">

    <div class="auth-bar">
        <span>🔑 Hasło:</span>
        <input type="password" id="passInput" oninput="checkPass()">
        <span id="lockStatus">🔒</span>
    </div>

    <div class="container">
        <div id="lockLayer"></div>
        <div id="syncInfo">📡 Inicjalizacja...</div>
        <h1>🏕️ Chcieć to móc!</h1>
        <div class="subtitle">Arkusz moich postępów</div>

        <div class="nav-bar">
            <button onclick="changeMonth(-1)">⬅️</button>
            <h2 id="currentMonthYear">...</h2>
            <button onclick="changeMonth(1)">➡️</button>
        </div>

        <div id="calendarGrid" class="grid"></div>

        <div class="status-footer">
            <div class="badges-box">
                <div id="weeklyBadges" style="display:flex; gap:5px; justify-content:center; flex-wrap:wrap;"></div>
            </div>
            <div class="reward-box">
                <input type="text" id="rewardInput" placeholder="Nagroda..." oninput="saveReward()">
                <div id="rewardTrophy" class="trophy-container">🏆</div>
            </div>
        </div>

        <div class="controls">
            <button onclick="window.print()" style="background: #4a5568;">🖨️ PDF</button>
            <button onclick="resetMonth()" style="background: #cbd5e0; color: #4a5568;">Reset</button>
        </div>
    </div>

    <script>
        let BLOB_ID = "019d8d55-95fa-76a3-83e1-549e6c466374"; // Twoje ID
        let API_URL = `https://jsonblob.com/api/jsonBlob/${BLOB_ID}`;

        let currentDate = new Date(2026, 3, 1);
        const symbols = ["", "☀️🚐", "🤔", "🌧️⛺"];
        let history = {};
        let isUnlocked = false;

        async function init() {
            try {
                const res = await fetch(API_URL);
                if (res.status === 404) throw new Error("Not Found");
                history = await res.json();
                document.getElementById('syncInfo').innerText = "✅ Dane pobrane";
                updateCalendar();
            } catch (e) {
                document.getElementById('syncInfo').innerText = "⚠️ Baza nie odpowiada. Próbuję naprawić...";
                // Jeśli blob nie istnieje, spróbuj go stworzyć (opcjonalne)
            }
        }

        async function saveData() {
            if (!isUnlocked) return;
            const status = document.getElementById('syncInfo');
            status.innerText = "💾 Zapisywanie...";
            
            try {
                const res = await fetch(API_URL, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Accept': 'application/json'
                    },
                    body: JSON.stringify(history)
                });
                
                if (res.ok) {
                    status.innerText = "✅ Zapisano pomyślnie";
                } else {
                    const errorMsg = await res.text();
                    console.error("Błąd API:", errorMsg);
                    status.innerText = "❌ Błąd zapisu (API error)";
                }
            } catch (e) {
                console.error("Błąd sieci:", e);
                status.innerText = "❌ Brak połączenia z bazą";
            }
        }

        function checkPass() {
            const pass = document.getElementById('passInput').value;
            const lock = document.getElementById('lockLayer');
            const status = document.getElementById('lockStatus');
            if(pass.toLowerCase() === "rajdowiec") {
                isUnlocked = true; lock.style.display = "none";
                status.innerText = "🔓"; status.style.color = "#4ade80";
            } else {
                isUnlocked = false; lock.style.display = "block";
                status.innerText = "🔒"; status.style.color = "white";
            }
        }

        function updateCalendar() {
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();
            const monthName = new Intl.DateTimeFormat('pl-PL', { month: 'long', year: 'numeric' }).format(currentDate);
            document.getElementById('currentMonthYear').innerText = monthName.charAt(0).toUpperCase() + monthName.slice(1);
            document.getElementById('bodyTag').className = (month === 6 || month === 7) ? 'bg-green' : 'bg-blue';

            const grid = document.getElementById('calendarGrid');
            grid.innerHTML = '';
            ["P", "W", "Ś", "C", "P", "S", "N"].forEach(day => grid.innerHTML += `<div class="day-label">${day}</div>`);

            let firstDay = new Date(year, month, 1).getDay();
            let offset = firstDay === 0 ? 6 : firstDay - 1; 
            for (let i = 0; i < offset; i++) grid.innerHTML += `<div></div>`;

            const daysInMonth = new Date(year, month + 1, 0).getDate();
            let monthKey = `${year}-${month}`;
            if (!history[monthKey]) history[monthKey] = { stickers: {}, reward: "" };
            document.getElementById('rewardInput').value = history[monthKey].reward || "";

            for (let i = 1; i <= daysInMonth; i++) {
                const cell = document.createElement('div');
                cell.className = 'day-cell';
                cell.innerHTML = `<span class="day-num">${i}</span>`;
                const stickerDiv = document.createElement('div');
                stickerDiv.className = 'sticker';
                stickerDiv.innerText = history[monthKey].stickers[i] || "";
                cell.appendChild(stickerDiv);
                
                cell.onclick = () => {
                    if(!isUnlocked) return;
                    let currentIdx = symbols.indexOf(stickerDiv.innerText);
                    stickerDiv.innerText = symbols[(currentIdx + 1) % symbols.length];
                    history[monthKey].stickers[i] = stickerDiv.innerText;
                    saveData();
                    updateTrophy();
                };
                grid.appendChild(cell);
            }
            updateTrophy();
        }

        function updateTrophy() {
            const monthKey = `${currentDate.getFullYear()}-${currentDate.getMonth()}`;
            const stickers = history[monthKey]?.stickers || {};
            let pos = 0, neu = 0, neg = 0;
            Object.values(stickers).forEach(s => {
                if(s === "☀️🚐") pos++; else if(s === "🤔") neu++; else if(s === "🌧️⛺") neg++;
            });
            const trophy = document.getElementById('rewardTrophy');
            trophy.style.borderColor = (pos > neu && pos > neg) ? "#4ade80" : (neg > pos && neg > neu) ? "#f87171" : "#cbd5e0";
        }

        function saveReward() { if(isUnlocked) { history[`${currentDate.getFullYear()}-${currentDate.getMonth()}`].reward = document.getElementById('rewardInput').value; saveData(); } }
        function changeMonth(dir) { currentDate.setMonth(currentDate.getMonth() + dir); updateCalendar(); }
        function resetMonth() { if(isUnlocked && confirm("Reset?")) { history[`${currentDate.getFullYear()}-${currentDate.getMonth()}`] = { stickers: {}, reward: "" }; saveData(); updateCalendar(); } }

        init();
    </script>
</body>
</html>
