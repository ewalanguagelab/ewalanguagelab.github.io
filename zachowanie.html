<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chcieć to móc - Arkusz Postępów</title>
    <style>
        :root {
            --pastel-blue: #e3f2fd;
            --pastel-green: #e8f5e9;
            --accent: #ff9800;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: background-color 0.5s;
            -webkit-tap-highlight-color: transparent;
        }

        .auth-bar {
            background: #2c3e50;
            color: white;
            padding: 10px 15px;
            border-radius: 50px;
            margin-bottom: 15px;
            display: flex;
            gap: 10px;
            align-items: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            font-size: 0.9em;
            width: 90%;
            max-width: 400px;
            justify-content: center;
            position: relative;
            z-index: 1000;
        }

        .auth-bar input {
            padding: 5px 10px;
            border-radius: 20px;
            border: none;
            width: 80px;
            font-size: 16px; /* Zapobiega zoomowaniu na iOS */
        }

        .container {
            max-width: 900px;
            width: 100%;
            background: white;
            padding: 15px;
            border-radius: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            border: 4px solid #fff;
            position: relative;
            box-sizing: border-box;
        }

        /* Blokada - obejmuje tylko interaktywne elementy, nie nawigację */
        #lockLayer {
            position: absolute;
            top: 150px; /* Poniżej nagłówka i nav-bar */
            left: 0; width: 100%; height: calc(100% - 150px);
            z-index: 100;
            display: block;
            background: rgba(255,255,255,0);
        }

        h1 { color: #2c3e50; text-align: center; font-size: 1.6em; margin: 10px 0 5px 0; }
        .subtitle { text-align: center; margin-bottom: 15px; color: #555; font-weight: bold; text-transform: uppercase; font-size: 0.75em; }

        .nav-bar { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 15px; 
            position: relative; 
            z-index: 200; /* Wyżej niż lockLayer */
        }
        .nav-bar h2 { font-size: 1em; margin: 0; }

        .grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; margin-bottom: 20px; }
        .day-label { text-align: center; font-weight: bold; color: #718096; font-size: 0.65em; }
        
        .day-cell { 
            aspect-ratio: 1; 
            border: 2px dashed #cbd5e0; 
            border-radius: 10px; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            position: relative; 
            background: #fff; 
            cursor: pointer;
        }
        .day-num { position: absolute; top: 3px; left: 4px; font-size: 0.7em; color: #a0aec0; }
        .sticker { font-size: 1.5em; }

        .status-footer { display: flex; flex-direction: column; gap: 15px; margin-top: 15px; }
        .badges-box { background: #fffef0; padding: 12px; border-radius: 20px; border: 3px solid #ffe082; text-align: center; }
        .badge-row { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; }
        
        .reward-box { background: #fdf2e9; padding: 15px; border-radius: 20px; border: 3px solid #ed8936; text-align: center; }
        #rewardInput { width: 100%; padding: 10px; border: 2px solid #e2e8f0; border-radius: 10px; text-align: center; font-size: 16px; margin-bottom: 10px; box-sizing: border-box; }

        .trophy-container {
            font-size: 2.2em;
            display: inline-block;
            padding: 8px;
            border-radius: 50%;
            border: 4px solid #cbd5e0;
            background: #fff;
            line-height: 1;
        }
        .trophy-green { border-color: #4ade80; }
        .trophy-yellow { border-color: #facc15; }
        .trophy-red { border-color: #f87171; }

        .badge { text-align: center; filter: grayscale(1); opacity: 0.1; width: 45px; transition: 0.3s; }
        .badge.active { filter: grayscale(0); opacity: 1; }
        .badge-icon { font-size: 1.5em; display: block; }
        .badge-label { font-size: 0.6em; font-weight: bold; }

        .controls { margin-top: 20px; display: flex; flex-direction: column; gap: 10px; width: 100%; position: relative; z-index: 200; }
        button { padding: 12px; border: none; border-radius: 50px; background: var(--accent); color: white; font-weight: bold; cursor: pointer; }
        
        @media (min-width: 600px) {
            .status-footer { display: grid; grid-template-columns: 1.2fr 1fr; }
            .controls { flex-direction: row; }
            .sticker { font-size: 2.5em; }
        }

        .bg-blue { background-color: var(--pastel-blue); }
        .bg-green { background-color: var(--pastel-green); }
        #syncInfo { font-size: 0.7em; color: #718096; text-align: center; margin-bottom: 5px; }
    </style>
</head>
<body id="bodyTag">

    <div class="auth-bar">
        <span>🔑 Hasło:</span>
        <input type="password" id="passInput" oninput="checkPass()">
        <span id="lockStatus">🔒</span>
    </div>

    <div class="container">
        <div id="lockLayer"></div>
        <div id="syncInfo">Inicjalizacja...</div>
        <h1>🏕️ Chcieć to móc!</h1>
        <div class="subtitle">Arkusz moich postępów</div>

        <div class="nav-bar">
            <button onclick="changeMonth(-1)">⬅️</button>
            <h2 id="currentMonthYear">Ładowanie...</h2>
            <button onclick="changeMonth(1)">➡️</button>
        </div>

        <div id="calendarGrid" class="grid"></div>

        <div class="status-footer">
            <div class="badges-box">
                <div id="weeklyBadges" class="badge-row"></div>
                <div id="monthlyAwardZone" style="margin-top:10px; font-size: 0.8em;"></div>
            </div>

            <div class="reward-box">
                <h3 style="margin:0 0 10px 0; font-size: 0.9em;">🎁 CEL MIESIĄCA:</h3>
                <input type="text" id="rewardInput" placeholder="O co grasz?" oninput="saveReward()">
                <div id="rewardTrophy" class="trophy-container">🏆</div>
                <div id="congratsLabel" style="font-weight:bold; margin-top:5px;"></div>
            </div>
        </div>

        <div class="controls">
            <button onclick="window.print()" style="background: #4a5568;">🖨️ PDF</button>
            <button onclick="resetMonth()" style="background: #cbd5e0; color: #4a5568;">Reset</button>
        </div>
    </div>

    <script>
        // UWAGA: Jeśli to Twoja własna baza, podmień ID poniżej.
        const BIN_ID = "fd0f47138ac12f6ff418"; 
        const API_URL = `https://api.npoint.io/${BIN_ID}`;

        let currentDate = new Date(2026, 3, 1);
        const symbols = ["", "☀️🚐", "🤔", "🌧️⛺"];
        const dayNames = ["P", "W", "Ś", "C", "P", "S", "N"];
        let history = {};
        let isUnlocked = false;

        async function loadFromServer() {
            try {
                const res = await fetch(API_URL);
                if (!res.ok) throw new Error();
                const data = await res.json();
                history = data || {};
                document.getElementById('syncInfo').innerText = "Dane zsynchronizowane";
                updateCalendar();
            } catch (e) {
                document.getElementById('syncInfo').innerText = "Błąd pobierania danych";
            }
        }

        async function saveToServer() {
            if (!isUnlocked) return;
            document.getElementById('syncInfo').innerText = "Zapisywanie w chmurze...";
            try {
                const res = await fetch(API_URL, {
                    method: 'PUT', // Kluczowa zmiana dla npoint.io
                    body: JSON.stringify(history),
                    headers: { 'Content-Type': 'application/json' }
                });
                if (res.ok) document.getElementById('syncInfo').innerText = "Zmiany zapisane u wszystkich";
            } catch (e) {
                document.getElementById('syncInfo').innerText = "Błąd zapisu!";
            }
        }

        // Odświeżaj dane co 20 sekund dla osób w trybie odczytu
        setInterval(() => { if(!isUnlocked) loadFromServer(); }, 20000);

        function checkPass() {
            const pass = document.getElementById('passInput').value;
            const lock = document.getElementById('lockLayer');
            const status = document.getElementById('lockStatus');
            if(pass.toLowerCase() === "rajdowiec") {
                isUnlocked = true; lock.style.display = "none";
                status.innerText = "🔓"; status.style.color = "#4ade80";
            } else {
                isUnlocked = false; lock.style.display = "block";
                status.innerText = "🔒"; status.style.color = "white";
            }
        }

        function updateCalendar() {
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();
            const monthName = new Intl.DateTimeFormat('pl-PL', { month: 'long', year: 'numeric' }).format(currentDate);
            document.getElementById('currentMonthYear').innerText = monthName.charAt(0).toUpperCase() + monthName.slice(1);
            document.getElementById('bodyTag').className = (month === 6 || month === 7) ? 'bg-green' : 'bg-blue';

            const grid = document.getElementById('calendarGrid');
            grid.innerHTML = '';
            dayNames.forEach(day => grid.innerHTML += `<div class="day-label">${day}</div>`);

            let firstDay = new Date(year, month, 1).getDay();
            let offset = firstDay === 0 ? 6 : firstDay - 1; 
            for (let i = 0; i < offset; i++) grid.innerHTML += `<div></div>`;

            const daysInMonth = new Date(year, month + 1, 0).getDate();
            let monthKey = `${year}-${month}`;
            if (!history[monthKey]) history[monthKey] = { stickers: {}, reward: "" };
            document.getElementById('rewardInput').value = history[monthKey].reward || "";

            for (let i = 1; i <= daysInMonth; i++) {
                const cell = document.createElement('div');
                cell.className = 'day-cell';
                cell.innerHTML = `<span class="day-num">${i}</span>`;
                const stickerDiv = document.createElement('div');
                stickerDiv.className = 'sticker';
                stickerDiv.innerText = history[monthKey].stickers[i] || "";
                cell.appendChild(stickerDiv);
                
                cell.onclick = () => {
                    if(!isUnlocked) return;
                    let currentIdx = symbols.indexOf(stickerDiv.innerText);
                    stickerDiv.innerText = symbols[(currentIdx + 1) % symbols.length];
                    history[monthKey].stickers[i] = stickerDiv.innerText;
                    checkBadges();
                    saveToServer();
                };
                grid.appendChild(cell);
            }
            checkBadges();
        }

        function checkBadges() {
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();
            const monthKey = `${year}-${month}`;
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const stickers = history[monthKey]?.stickers || {};

            let totalPos = 0, totalNeu = 0, totalNeg = 0;
            for (let d = 1; d <= daysInMonth; d++) {
                if (stickers[d] === "☀️🚐") totalPos++;
                else if (stickers[d] === "🤔") totalNeu++;
                else if (stickers[d] === "🌧️⛺") totalNeg++;
            }

            const trophy = document.getElementById('rewardTrophy');
            trophy.className = "trophy-container";
            if (totalPos > totalNeu && totalPos > totalNeg) trophy.classList.add('trophy-green');
            else if (totalNeg > totalPos && totalNeg > totalNeu) trophy.classList.add('trophy-red');
            else if (totalPos > 0 || totalNeu > 0 || totalNeg > 0) trophy.classList.add('trophy-yellow');

            const weekly = document.getElementById('weeklyBadges');
            weekly.innerHTML = '';
            for (let d = 1; d <= daysInMonth; d++) {
                if (new Date(year, month, d).getDay() === 0) {
                    const b = document.createElement('div');
                    b.className = 'badge active';
                    b.innerHTML = `<span class="badge-icon">🏆</span><span class="badge-label">${d}.${month+1}</span>`;
                    weekly.appendChild(b);
                }
            }
        }

        function saveReward() { if(isUnlocked) { history[`${currentDate.getFullYear()}-${currentDate.getMonth()}`].reward = document.getElementById('rewardInput').value; saveToServer(); } }
        function changeMonth(dir) { currentDate.setMonth(currentDate.getMonth() + dir); updateCalendar(); }
        function resetMonth() { if(isUnlocked && confirm("Wyczyścić dane miesiąca?")) { history[`${currentDate.getFullYear()}-${currentDate.getMonth()}`] = { stickers: {}, reward: "" }; saveToServer(); updateCalendar(); } }

        loadFromServer();
    </script>
</body>
</html>
